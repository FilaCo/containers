services:
  mc:
    container_name: mc
    image: itzg/minecraft-server
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      ONLINE_MODE: "true"
      MEMORY: "8192M"
      MAX_PLAYERS: "10"
      MOTD: "FilaCo's Minecraft Server"
      TZ: "Europe/Moscow"
      DIFFICULTY: "2"      
      LEVEL: "filaco-world"
      SIMULATION_DISTANCE: "16"
      VIEW_DISTANCE: "16"
    volumes:
      - $MINECRAFT_HOME/data:/data
