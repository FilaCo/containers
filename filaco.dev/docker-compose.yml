services:
    filaco-dev:
        image: nginx:alpine
        restart: unless-stopped
        container_name: filaco-dev
        volumes:
            - $FILACO_DEV_HOME:/var/www/filaco.dev
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - frontend

    filaco-dev-lb:
        image: nginx:alpine
        restart: unless-stopped
        container_name: filaco-dev-lb
        volumes:
            - ./nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - frontend

networks:
    frontend:
        external: true
